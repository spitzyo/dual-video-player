<!DOCTYPE html>
<!--
  Dual Video Library — a single-file, offline tool to play two clips side by side,
  perfectly synced, with one shared timeline, speed, and audio source.
  No build step, no dependencies, no data leaves the browser. Just open this file.
  Works in any modern browser; the automatic audio-source pick relies on the
  audioTracks API, which is most reliable in Safari (see README).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --sidebar:#FBFBFC; --stage:#F1F1F3;
    --line:#E6E7EB; --line-2:#EFEFF2;
    --txt:#16181D; --muted:#6B7280; --muted-2:#A1A6AF;
    --accent:#E5484D; --accent-soft:#FCECED;
    --sans:'Manrope',system-ui,-apple-system,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
  .app{display:flex;height:100vh}
  button{font-family:inherit;cursor:pointer}
  svg{display:block}

  /* ============ SIDEBAR ============ */
  .sidebar{width:264px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--line);
    display:flex;flex-direction:column;transition:width .2s ease;overflow:hidden}
  .app.collapsed .sidebar{width:52px}
  .lib-head{padding:14px;border-bottom:1px solid var(--line)}
  .head-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .hamburger{background:none;border:none;width:26px;height:26px;display:flex;align-items:center;
    justify-content:center;border-radius:6px;flex-shrink:0;transition:background .12s}
  .hamburger:hover{background:var(--line-2)}
  .hamburger svg{width:18px;height:18px;stroke:var(--txt)}
  .head-top .label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2)}
  .collapsible{transition:opacity .12s}
  .app.collapsed .collapsible{opacity:0;pointer-events:none}
  .app.collapsed .head-top .label{opacity:0}
  .open-btn{display:flex;align-items:center;gap:9px;width:100%;background:var(--txt);color:#fff;
    border:none;border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;transition:opacity .15s;white-space:nowrap}
  .open-btn:hover{opacity:.88}
  .open-btn svg{width:16px;height:16px;stroke:#fff;flex-shrink:0}
  .load-two{display:flex;align-items:center;gap:9px;width:100%;background:#fff;color:var(--txt);
    border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:500;margin-top:8px;transition:.15s;white-space:nowrap}
  .load-two:hover{border-color:var(--muted-2)}
  .load-two svg{width:15px;height:15px;stroke:var(--muted);flex-shrink:0}
  .lib-root{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lib-tree{flex:1;overflow-y:auto;padding:8px}
  .app.collapsed .lib-tree{opacity:0;pointer-events:none}
  .tree-empty{padding:36px 18px;text-align:center;color:var(--muted-2);font-size:13px;line-height:1.6}
  .node{user-select:none}
  .row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;font-size:13px;
    color:var(--txt);cursor:pointer;transition:background .12s;white-space:nowrap;overflow:hidden}
  .row:hover{background:var(--line-2)}
  .row .chev{width:14px;height:14px;flex-shrink:0;stroke:var(--muted-2);transition:transform .15s}
  .node.open > .row .chev{transform:rotate(90deg)}
  .row .ic{width:15px;height:15px;flex-shrink:0;stroke:var(--muted);fill:none}
  .row .nm{overflow:hidden;text-overflow:ellipsis}
  .row .badge{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted-2);flex-shrink:0;padding-left:6px}
  .row.pair .ic{stroke:var(--accent)}
  .row.active{background:var(--accent-soft);color:var(--accent)}
  .row.active .ic{stroke:var(--accent)} .row.active .badge{color:var(--accent)}
  .children{display:none;padding-left:14px;border-left:1px solid var(--line);margin-left:15px}
  .node.open > .children{display:block}

  /* ============ WORKSPACE ============ */
  .workspace{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .workspace:fullscreen,.workspace:-webkit-full-screen{width:100%;height:100%;background:var(--bg)}

  .stages{flex:1;display:flex;min-height:0;background:var(--stage)}
  .stage{flex-grow:1;flex-basis:0;min-width:36px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage video{width:100%;height:100%;object-fit:contain;display:none;background:#0b0b0d}
  .stage.loaded video{display:block}
  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted-2);text-align:center;padding:20px;pointer-events:none}
  .stage.loaded .placeholder{display:none}
  .placeholder .tag{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2)}
  .placeholder .hint{font-size:12px;font-family:var(--mono)}

  .v-divider{width:9px;flex-shrink:0;background:var(--line);cursor:col-resize;position:relative;
    display:flex;align-items:center;justify-content:center;transition:background .12s;touch-action:none}
  .v-divider:hover,.v-divider.dragging{background:#CFD2D8}
  .v-divider::after{content:"";width:3px;height:38px;border-radius:3px;background:var(--muted-2);transition:background .12s}
  .v-divider:hover::after,.v-divider.dragging::after{background:var(--muted)}

  /* ============ TRANSPORT ============ */
  .transport{padding:16px 24px 20px;border-top:1px solid var(--line)}
  .scrub-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .tc{font-family:var(--mono);font-size:13.5px;color:var(--muted);min-width:68px}
  .tc.cur{color:var(--txt);text-align:right}
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
  input[type=range]:focus{outline:none}
  .scrub{flex:1}
  .scrub::-webkit-slider-runnable-track{height:6px;border-radius:100px;background:linear-gradient(90deg,var(--accent) 0 var(--p,0%),var(--line) var(--p,0%))}
  .scrub::-moz-range-track{height:6px;border-radius:100px;background:var(--line)}
  .scrub::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);margin-top:-4.5px;box-shadow:0 0 0 3px rgba(255,255,255,.9);transition:transform .1s}
  .scrub::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:50%;background:var(--accent)}
  .scrub::-webkit-slider-thumb:hover{transform:scale(1.15)}

  .controls{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
  .left-ctl{justify-self:start;display:flex;gap:8px}
  .center-cluster{display:flex;align-items:center;gap:10px;justify-self:center}

  .tbtn{background:#fff;border:1px solid var(--line);border-radius:10px;height:52px;min-width:52px;
    display:flex;align-items:center;justify-content:center;gap:7px;transition:.12s;padding:0 14px}
  .tbtn:hover{border-color:var(--muted-2);background:#fafafa}
  .tbtn svg{width:21px;height:21px;stroke:var(--txt);fill:none}
  .tbtn .sec{font-family:var(--mono);font-size:14px;color:var(--muted);font-weight:500}
  .tbtn.play{width:62px;height:62px;background:var(--accent);border-color:var(--accent);padding:0}
  .tbtn.play:hover{background:#d83b40}
  .tbtn.play svg{stroke:#fff;fill:#fff;width:24px;height:24px}
  .tbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .audio{display:flex;align-items:center;gap:9px;margin-left:2px;padding-left:12px;border-left:1px solid var(--line-2)}
  .audio .spk{width:19px;height:19px;stroke:var(--muted);flex-shrink:0}
  .seg-group{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg{background:#fff;border:none;width:42px;height:46px;font-family:var(--mono);font-size:15px;font-weight:500;color:var(--muted);transition:.12s}
  .seg+.seg{border-left:1px solid var(--line)}
  .seg:hover{background:var(--line-2)}
  .seg.active{background:var(--txt);color:#fff}
  .seg:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

  .speed-block{display:flex;align-items:center;gap:14px;justify-self:end;flex-wrap:wrap;justify-content:flex-end}
  .speed-ctl{display:flex;align-items:center;gap:12px}
  .speed-ctl .lab{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .speed{width:175px}
  .speed::-webkit-slider-runnable-track{height:5px;border-radius:100px;background:linear-gradient(90deg,var(--txt) 0 var(--sp,40%),var(--line) var(--sp,40%))}
  .speed::-moz-range-track{height:5px;border-radius:100px;background:var(--line)}
  .speed::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:4px;background:var(--txt);margin-top:-5.5px;transition:transform .1s}
  .speed::-moz-range-thumb{width:15px;height:15px;border:none;border-radius:4px;background:var(--txt)}
  .speed::-webkit-slider-thumb:hover{transform:scale(1.12)}
  .speed-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--txt);min-width:64px;text-align:center;border:1px solid var(--line);border-radius:8px;padding:7px 6px}
  .presets{display:flex;gap:6px;margin-left:8px}
  .preset{font-family:var(--mono);font-size:14px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:7px;padding:8px 0;min-width:58px;text-align:center;transition:.12s}
  .preset:hover{border-color:var(--muted-2);color:var(--txt)}
  .preset.active{border-color:var(--txt);color:var(--txt);background:#F4F4F5;font-weight:500}

  @media (max-width:900px){
    .controls{grid-template-columns:1fr;justify-items:center;gap:14px}
    .speed-block,.center-cluster,.left-ctl{justify-self:center}
  }
  body.resizing, body.resizing *{cursor:col-resize !important;user-select:none !important}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="lib-head">
      <div class="head-top">
        <button class="hamburger" id="ham" title="L">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        </button>
        <span class="label">Library</span>
      </div>
      <div class="collapsible">
        <button class="open-btn" id="openBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Open library folder
        </button>
        <button class="load-two" id="loadTwoBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="9" height="12" rx="1.5"/><rect x="13" y="6" width="9" height="12" rx="1.5"/></svg>
          Load two clips
        </button>
        <div class="lib-root" id="libRoot"></div>
      </div>
      <input type="file" id="libInput" webkitdirectory directory multiple hidden>
      <input type="file" id="twoInput" accept="video/*" multiple hidden>
    </div>
    <div class="lib-tree" id="libTree">
      <div class="tree-empty">No library open yet.<br>Open a folder of paired clips, or load two clips directly.</div>
    </div>
  </aside>

  <!-- ============ WORKSPACE ============ -->
  <main class="workspace" id="workspace">
    <div class="stages" id="stages">
      <div class="stage" id="stageA">
        <video id="videoA" playsinline></video>
        <div class="placeholder"><span class="tag">Deck A</span><span class="hint">left clip loads here</span></div>
      </div>
      <div class="v-divider" id="divider" title="Drag to resize"></div>
      <div class="stage" id="stageB">
        <video id="videoB" playsinline></video>
        <div class="placeholder"><span class="tag">Deck B</span><span class="hint">right clip loads here</span></div>
      </div>
    </div>

    <div class="transport">
      <div class="scrub-row">
        <div class="tc cur" id="curTime">00:00</div>
        <input type="range" class="scrub" id="scrub" min="0" max="1000" value="0" aria-label="Timeline">
        <div class="tc" id="durTime">00:00</div>
      </div>

      <div class="controls">
        <div class="left-ctl">
          <button class="tbtn" id="fsBtn" title="F">
            <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
          </button>
          <button class="tbtn" id="swapBtn" title="S">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h16"/><path d="M16 4l4 4-4 4"/><path d="M20 16H4"/><path d="M8 12l-4 4 4 4"/></svg>
          </button>
          <button class="tbtn" id="refreshBtn" title="R">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
          </button>
          <div class="audio" title="a">
            <svg class="spk" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
            <div class="seg-group">
              <button class="seg active" data-side="L">L</button>
              <button class="seg" data-side="R">R</button>
            </div>
          </div>
        </div>

        <div class="center-cluster">
          <button class="tbtn" id="back" title="←">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
            <span class="sec">10s</span>
          </button>
          <button class="tbtn play" id="play" title="Space">
            <svg viewBox="0 0 24 24" id="playIcon"><polygon points="6 4 20 12 6 20" fill="#fff" stroke="none"/></svg>
          </button>
          <button class="tbtn" id="fwd" title="→">
            <span class="sec">10s</span>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 7 18 12 13 17"/><polyline points="6 7 11 12 6 17"/></svg>
          </button>
          <button class="tbtn" id="fwd15">
            <span class="sec">15m</span>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 7 20 12 15 17"/><polyline points="8 7 13 12 8 17"/><polyline points="1 7 6 12 1 17"/></svg>
          </button>
        </div>

        <div class="speed-block">
          <div class="speed-ctl">
            <span class="lab">speed</span>
            <input type="range" class="speed" id="speed" min="0.1" max="2" step="0.05" value="1" aria-label="Playback speed">
            <div class="speed-val" id="speedVal">1.00×</div>
          </div>
          <div class="presets" id="presets">
            <button class="preset active" data-s="1" title="§">1×</button>
            <button class="preset" data-s="1.5" title="5">1.5×</button>
            <button class="preset" data-s="2" title="0">2×</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  const app=document.getElementById('app');
  const A=document.getElementById('videoA'), B=document.getElementById('videoB');
  const stageA=document.getElementById('stageA'), stageB=document.getElementById('stageB');
  const stages=document.getElementById('stages'), divider=document.getElementById('divider');
  const scrub=document.getElementById('scrub'), speed=document.getElementById('speed');
  const VIDEO_RE=/\.(mp4|m4v|mov|webm|ogg|ogv|mkv)$/i;
  const FPS=30, DRIFT=0.5, SYNC_MS=2000;
  let playing=false, activeRow=null, audioDeck='A', swapped=false, currentPair=null, audioResolved=false, audioCheckUntil=0;

  /* ---------- sidebar collapse ---------- */
  document.getElementById('ham').addEventListener('click',()=>app.classList.toggle('collapsed'));

  /* ---------- ad-hoc two-clip load ---------- */
  document.getElementById('loadTwoBtn').addEventListener('click',()=>document.getElementById('twoInput').click());
  document.getElementById('twoInput').addEventListener('change',e=>{
    const vids=[...e.target.files].filter(f=>VIDEO_RE.test(f.name));
    if(vids.length<2){alert('Pick two video files (Cmd-click to select both).');return;}
    if(activeRow){activeRow.classList.remove('active');activeRow=null;}
    loadPair([vids[0],vids[1]]);
  });

  /* ---------- library folder ---------- */
  document.getElementById('openBtn').addEventListener('click',()=>document.getElementById('libInput').click());
  document.getElementById('libInput').addEventListener('change',e=>{
    const files=[...e.target.files]; if(!files.length) return;
    const tree=buildTree(files);
    const topName=Object.keys(tree.children)[0]||'Library';
    document.getElementById('libRoot').textContent='/ '+topName;
    renderTree(tree.children[topName]||tree);
  });
  function buildTree(files){
    const root={children:{},videos:[]};
    for(const f of files){
      const parts=(f.webkitRelativePath||f.name).split('/');
      let node=root;
      for(let i=0;i<parts.length-1;i++){const seg=parts[i];node.children[seg]=node.children[seg]||{name:seg,children:{},videos:[]};node=node.children[seg];}
      if(VIDEO_RE.test(parts[parts.length-1])) node.videos.push(f);
    }
    return root;
  }
  function sortedChildren(n){return Object.values(n.children).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));}
  function renderTree(top){
    const host=document.getElementById('libTree'); host.innerHTML='';
    const kids=sortedChildren(top);
    if(!kids.length && top.videos.length<2){host.innerHTML='<div class="tree-empty">No paired clips found.<br>Each pair should be a folder holding 2 clips.</div>';return;}
    const frag=document.createDocumentFragment();
    for(const c of kids) frag.appendChild(renderNode(c));
    if(top.videos.length>=2) frag.appendChild(renderPairRow(top,'(root pair)'));
    host.appendChild(frag);
  }
  function renderNode(node){
    const kids=sortedChildren(node), isPair=node.videos.length>=2, hasKids=kids.length>0;
    const wrap=document.createElement('div'); wrap.className='node';
    if(hasKids){
      const row=document.createElement('div'); row.className='row';
      row.innerHTML='<svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg><svg class="ic" viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="nm"></span>';
      row.querySelector('.nm').textContent=node.name;
      const cw=document.createElement('div'); cw.className='children';
      for(const c of kids) cw.appendChild(renderNode(c));
      if(isPair) cw.appendChild(renderPairRow(node,'• both clips here'));
      row.addEventListener('click',()=>wrap.classList.toggle('open'));
      wrap.appendChild(row); wrap.appendChild(cw);
    } else if(isPair){ wrap.appendChild(renderPairRow(node,node.name)); }
    else { return document.createDocumentFragment(); }
    return wrap;
  }
  function renderPairRow(node,label){
    const row=document.createElement('div'); row.className='row pair';
    const vids=node.videos.slice().sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
    row.innerHTML='<span style="width:14px;flex-shrink:0"></span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="9" height="12" rx="1.5"/><rect x="13" y="6" width="9" height="12" rx="1.5"/></svg><span class="nm"></span><span class="badge">'+vids.length+'</span>';
    row.querySelector('.nm').textContent=label||node.name;
    row.addEventListener('click',ev=>{ev.stopPropagation();if(activeRow)activeRow.classList.remove('active');row.classList.add('active');activeRow=row;loadPair(vids);});
    return row;
  }

  function loadPair(vids){
    currentPair=[vids[0],vids[1]];
    audioResolved=false; audioCheckUntil=performance.now()+8000;
    loadInto(A,stageA,vids[0]);
    loadInto(B,stageB,vids[1]);
    pause(); seekTo(0);
    setAudio('A');                       // baseline: left
    app.classList.add('collapsed');
  }
  // Auto-pick the deck that has audio, via the audioTracks API. It IS reliable in
  // Safari — it just populates a little after metadata — so we keep checking (from
  // the UI loop) for a few seconds until it can tell the two clips apart, then switch.
  function trackState(v){ return (v.audioTracks && typeof v.audioTracks.length==='number') ? v.audioTracks.length>0 : null; }
  function maybeAutoPickAudio(){
    if(audioResolved || performance.now()>audioCheckUntil) return;
    const a=trackState(A), b=trackState(B);
    if(a===true && b===false){ setAudio('A'); audioResolved=true; }
    else if(b===true && a===false){ setAudio('B'); audioResolved=true; }
    // both same / not populated yet → keep polling until the window closes
  }
  function loadInto(video,stage,file){
    if(video.dataset.url) URL.revokeObjectURL(video.dataset.url);
    const url=URL.createObjectURL(file); video.dataset.url=url;
    try{video.preservesPitch=video.webkitPreservesPitch=true;}catch(_){}
    video.src=url; video.load(); stage.classList.add('loaded');
  }

  /* ---------- reload current pair, preserving state ---------- */
  function nextMeta(v){return new Promise(res=>v.addEventListener('loadedmetadata',res,{once:true}));}
  function reloadPair(){
    if(!currentPair)return;
    const st={t:masterTime(),rate:+speed.value,aud:audioDeck};
    pause();                                   // pause first
    const pa=nextMeta(A), pb=nextMeta(B);
    loadInto(A,stageA,currentPair[0]);
    loadInto(B,stageB,currentPair[1]);
    Promise.all([pa,pb]).then(()=>{
      setRate(st.rate); setAudio(st.aud); seekTo(st.t);
      // stay paused — press Space to resume cleanly
    });
  }
  document.getElementById('refreshBtn').addEventListener('click',reloadPair);

  /* ---------- swap sides (layout only — videos keep playing) ---------- */
  divider.style.order='1';
  function applySwap(){ stageA.style.order=swapped?'2':'0'; stageB.style.order=swapped?'0':'2'; }
  function leftStage(){return swapped?stageB:stageA;}
  function rightStage(){return swapped?stageA:stageB;}
  applySwap();
  function swapSides(){swapped=!swapped;applySwap();updateAudioButtons();}
  document.getElementById('swapBtn').addEventListener('click',swapSides);

  /* ---------- draggable boundary ---------- */
  let dragging=false;
  function doDrag(clientX){
    const r=stages.getBoundingClientRect();
    let ratio=(clientX-r.left)/r.width; ratio=Math.max(.08,Math.min(.92,ratio));
    leftStage().style.flexGrow=ratio*100; rightStage().style.flexGrow=(1-ratio)*100;
  }
  function endDrag(){if(!dragging)return;dragging=false;divider.classList.remove('dragging');document.body.classList.remove('resizing');}
  divider.addEventListener('mousedown',e=>{e.preventDefault();dragging=true;divider.classList.add('dragging');document.body.classList.add('resizing');});
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    if(e.buttons===0){endDrag();return;}   // button already released → stop following
    doDrag(e.clientX);
  });
  window.addEventListener('mouseup',endDrag);
  window.addEventListener('blur',endDrag);
  // touch
  divider.addEventListener('touchstart',()=>{dragging=true;divider.classList.add('dragging');document.body.classList.add('resizing');},{passive:true});
  window.addEventListener('touchmove',e=>{if(dragging&&e.touches[0])doDrag(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',endDrag);
  window.addEventListener('touchcancel',endDrag);

  /* ---------- audio reference (the deck you hear is the master) ---------- */
  function audible(){return audioDeck==='B'?B:A;}
  function silent(){return audioDeck==='B'?A:B;}
  function bothLoaded(){return A.src&&B.src;}
  function clampTo(v,t){return Math.max(0,Math.min(t,isFinite(v.duration)?v.duration:t));}

  /* ---------- transport ---------- */
  function anyLoaded(){return A.src||B.src;}
  function refDuration(){const a=isFinite(A.duration)?A.duration:0,b=isFinite(B.duration)?B.duration:0;return Math.max(a,b)||0;}
  function masterTime(){const av=audible();if(av.src)return av.currentTime;return A.src?A.currentTime:(B.src?B.currentTime:0);}
  function play(){if(!anyLoaded())return;syncTargets(true);const ps=[];if(A.src)ps.push(A.play());if(B.src)ps.push(B.play());Promise.allSettled(ps);playing=true;setPlayIcon(true);}
  function pause(){A.pause();B.pause();playing=false;setPlayIcon(false);}
  function toggle(){playing?pause():play();}
  function setPlayIcon(p){document.getElementById('playIcon').innerHTML=p?'<rect x="6" y="5" width="4" height="14" rx="1" fill="#fff" stroke="none"/><rect x="14" y="5" width="4" height="14" rx="1" fill="#fff" stroke="none"/>':'<polygon points="6 4 20 12 6 20" fill="#fff" stroke="none"/>';}
  function seekTo(t){t=Math.max(0,Math.min(t,refDuration()));if(A.src)A.currentTime=clampTo(A,t);if(B.src)B.currentTime=clampTo(B,t);updateUI();}
  // only ever nudge the MUTED deck — the one you're listening to is never interrupted
  function syncTargets(force){if(!bothLoaded())return;const av=audible(),si=silent();const target=clampTo(si,av.currentTime);if(force||Math.abs(si.currentTime-target)>DRIFT)si.currentTime=target;}

  document.getElementById('play').addEventListener('click',toggle);
  [A,B].forEach(v=>v.addEventListener('click',toggle));   // click the video itself to play/pause
  document.getElementById('fwd15').addEventListener('click',()=>seekTo(masterTime()+900));
  document.getElementById('back').addEventListener('click',()=>seekTo(masterTime()-10));
  document.getElementById('fwd').addEventListener('click',()=>seekTo(masterTime()+10));
  A.addEventListener('loadedmetadata',()=>document.getElementById('durTime').textContent=fmt(refDuration()));
  B.addEventListener('loadedmetadata',()=>document.getElementById('durTime').textContent=fmt(refDuration()));
  [A,B].forEach(v=>v.addEventListener('ended',()=>{if(A.ended||B.ended)pause();}));

  let scrubbing=false;
  scrub.addEventListener('input',()=>{scrubbing=true;seekTo((scrub.value/1000)*refDuration());});
  scrub.addEventListener('change',()=>scrubbing=false);
  // click anywhere on the track (the grey part) to jump there — works alongside dragging
  scrub.addEventListener('pointerdown',e=>{
    const r=scrub.getBoundingClientRect();
    const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    scrubbing=true; scrub.value=frac*1000; seekTo(frac*refDuration());
  });
  window.addEventListener('pointerup',()=>{ if(scrubbing) scrubbing=false; });

  /* ---------- speed ---------- */
  function setRate(r){
    r=Math.max(0.1,Math.min(2,Math.round(r*100)/100));
    A.playbackRate=r;B.playbackRate=r;speed.value=r;
    document.getElementById('speedVal').textContent=r.toFixed(2)+'×';
    speed.style.setProperty('--sp',((r-0.1)/1.9*100)+'%');
    document.querySelectorAll('.preset').forEach(p=>p.classList.toggle('active',parseFloat(p.dataset.s)===r));
  }
  speed.addEventListener('input',()=>setRate(+speed.value));
  document.getElementById('presets').addEventListener('click',e=>{const b=e.target.closest('.preset');if(b)setRate(+b.dataset.s);});

  /* ---------- audio L/R (follows physical side, not the underlying deck) ---------- */
  function leftDeckLetter(){ return swapped?'B':'A'; }
  function rightDeckLetter(){ return swapped?'A':'B'; }
  function audioSide(){ return audioDeck===leftDeckLetter() ? 'L' : 'R'; }   // where the audio deck currently sits
  function updateAudioButtons(){
    const side=audioSide();
    document.querySelectorAll('.seg').forEach(s=>s.classList.toggle('active',s.dataset.side===side));
  }
  function setAudio(which){            // which = 'A' or 'B' (deck letter)
    audioDeck=which;
    A.muted=(which!=='A'); B.muted=(which!=='B');
    updateAudioButtons();
    if(playing) syncTargets(true);     // re-align the now-muted deck to the one you hear
  }
  function setAudioBySide(side){ setAudio(side==='L'?leftDeckLetter():rightDeckLetter()); }
  document.querySelectorAll('.seg').forEach(s=>s.addEventListener('click',()=>{audioResolved=true;setAudioBySide(s.dataset.side);}));
  function toggleAudio(){audioResolved=true;setAudio(audioDeck==='A'?'B':'A');}
  setAudio('A');

  /* ---------- fullscreen ---------- */
  const ws=document.getElementById('workspace');
  function fsElement(){return document.fullscreenElement||document.webkitFullscreenElement;}
  function toggleFs(){if(fsElement()){(document.exitFullscreen||document.webkitExitFullscreen).call(document);}else{(ws.requestFullscreen||ws.webkitRequestFullscreen).call(ws);}}
  function setFsIcon(){const on=!!fsElement();document.getElementById('fsIcon').innerHTML=on?'<path d="M9 4v3a2 2 0 0 1-2 2H4M15 4v3a2 2 0 0 0 2 2h3M9 20v-3a2 2 0 0 0-2-2H4M15 20v-3a2 2 0 0 1 2-2h3"/>':'<path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/>';}
  document.getElementById('fsBtn').addEventListener('click',toggleFs);
  document.addEventListener('fullscreenchange',setFsIcon);
  document.addEventListener('webkitfullscreenchange',setFsIcon);

  /* ---------- ui + gentle sync ---------- */
  function fmt(s){
    if(!isFinite(s)||s<0)s=0;
    const sec=Math.floor(s%60);
    if(refDuration()>=3600){
      const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
      return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    }
    return String(Math.floor(s/60)).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  }
  function updateUI(){
    maybeAutoPickAudio();
    const t=masterTime(),d=refDuration();
    document.getElementById('curTime').textContent=fmt(t);
    if(!scrubbing&&d>0){const p=t/d*100;scrub.value=p*10;scrub.style.setProperty('--p',p+'%');}
  }
  setInterval(updateUI,200);
  setInterval(()=>{if(playing&&!scrubbing)syncTargets(false);},SYNC_MS);

  /* ---------- keyboard ---------- */
  document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    const k=e.key;
    // speed:  § = 1.0,  1..9 = 1.1..1.9,  0 = 2.0
    if(k==='§'||k==='`'){setRate(1.0);return;}
    if(k>='1'&&k<='9'){setRate(1.0+(+k)/10);return;}
    if(k==='0'){setRate(2.0);return;}
    switch(k){
      case ' ':e.preventDefault();toggle();break;
      case 'ArrowLeft':e.preventDefault();seekTo(masterTime()-10);break;
      case 'ArrowRight':e.preventDefault();seekTo(masterTime()+10);break;
      case ',':seekTo(masterTime()-1/FPS);break;   // frame step back
      case '.':seekTo(masterTime()+1/FPS);break;   // frame step forward
      case 'f':case 'F':toggleFs();break;
      case 's':case 'S':swapSides();break;
      case 'a':case 'A':toggleAudio();break;
      case 'l':case 'L':app.classList.toggle('collapsed');break;
      case 'r':case 'R':reloadPair();break;
    }
  });

  setRate(1); setPlayIcon(false);
})();
</script>
</body>
</html>
